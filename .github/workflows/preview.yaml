name: PR Preview (Surge)

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

# One preview per PR; a new push supersedes the in-flight build
concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  PREVIEW_DOMAIN: lunatech-blog-pr-${{ github.event.pull_request.number }}.surge.sh

jobs:
  deploy:
    name: Build and deploy preview
    # Fork PRs get no secrets and a read-only token, so skip the preview there
    if: github.event.action != 'closed' && github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v7

      - name: Generate Roq site
        # Generate only (no Pages upload) and point absolute links
        # (canonical/OG/RSS/sitemap) at the preview host so the preview is
        # self-consistent. Output lands in target/roq for the Surge deploy.
        uses: quarkiverse/quarkus-roq@6ee673e6b6a4e36902901ad66fbaafbb4f683f61 # v1
        env:
          # Authenticates the author-name lookups against the GitHub users API
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          github-pages: 'false'
          java-version: '25'
          site-url: https://${{ env.PREVIEW_DOMAIN }}

      - name: Deploy to Surge
        env:
          SURGE_LOGIN: ${{ secrets.SURGE_LOGIN }}
          SURGE_TOKEN: ${{ secrets.SURGE_TOKEN }}
        run: |
          npm install -g surge
          surge ./target/roq "$PREVIEW_DOMAIN" --token "$SURGE_TOKEN"

      - name: Comment preview URL on the PR
        uses: actions/github-script@v9
        with:
          script: |
            const url = `https://${process.env.PREVIEW_DOMAIN}`;
            const marker = '<!-- surge-preview -->';
            const body = `${marker}\n🔎 **Preview deployed:** ${url}\n\n_Rebuilt on every push to this PR._`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo, comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body,
              });
            }

  teardown:
    name: Tear down preview
    if: github.event.action == 'closed' && github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Tear down Surge preview
        env:
          SURGE_LOGIN: ${{ secrets.SURGE_LOGIN }}
          SURGE_TOKEN: ${{ secrets.SURGE_TOKEN }}
        run: |
          npm install -g surge
          surge teardown "$PREVIEW_DOMAIN" --token "$SURGE_TOKEN" || true
