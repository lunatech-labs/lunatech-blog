name: PR Preview (Surge)

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

# One preview per PR; a new push supersedes the in-flight build
concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  PREVIEW_DOMAIN: lunatech-blog-pr-${{ github.event.pull_request.number }}.surge.sh

jobs:
  deploy:
    name: Build and deploy preview
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Generate static site
        # Point absolute links (canonical/OG/RSS/sitemap) at the preview host so
        # the preview is self-consistent. site.url is a build-time property, so it
        # must be set on the package command. Internal navigation is relative anyway.
        run: |
          ./mvnw -B --no-transfer-progress clean package \
            -Dquarkus.roq.generator.batch=true -DskipTests \
            -Dsite.url=https://${PREVIEW_DOMAIN}
          java -jar target/quarkus-app/quarkus-run.jar

      - name: Prepare output for Surge
        # Drop the production CNAME so Surge does not try to publish to the
        # custom domain; --domain below selects the per-PR subdomain.
        run: rm -f target/roq/CNAME

      - name: Deploy to Surge
        env:
          SURGE_LOGIN: ${{ secrets.SURGE_LOGIN }}
          SURGE_TOKEN: ${{ secrets.SURGE_TOKEN }}
        run: |
          npm install -g surge
          surge ./target/roq "$PREVIEW_DOMAIN" --token "$SURGE_TOKEN"

      - name: Comment preview URL on the PR
        uses: actions/github-script@v7
        with:
          script: |
            const url = `https://${process.env.PREVIEW_DOMAIN}`;
            const marker = '<!-- surge-preview -->';
            const body = `${marker}\n🔎 **Preview deployed:** ${url}\n\n_Rebuilt on every push to this PR._`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo, comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body,
              });
            }

  teardown:
    name: Tear down preview
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Tear down Surge preview
        env:
          SURGE_LOGIN: ${{ secrets.SURGE_LOGIN }}
          SURGE_TOKEN: ${{ secrets.SURGE_TOKEN }}
        run: |
          npm install -g surge
          surge teardown "$PREVIEW_DOMAIN" --token "$SURGE_TOKEN" || true
