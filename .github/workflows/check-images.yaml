name: Check Image Size

on:
  - pull_request

jobs:
  check-image-size:
    name: Check Image Size
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - shell: bash
        run: |
          # Only added/copied/modified/renamed PNGs; deleted paths are skipped
          # so `du` is never asked to stat a file that no longer exists (which
          # would otherwise abort the step under `set -eo pipefail`).
          changed_files=$(git diff --name-only --diff-filter=ACMR "origin/${GITHUB_BASE_REF}" -- '*.png')
          echo "Changed PNG files:"
          echo "$changed_files"

          big_files=""
          for file in $changed_files; do
            # A renamed-and-deleted-in-a-later-commit path may still be absent.
            [ -f "$file" ] || continue
            if [ -n "$(find "$file" -size +1M -print -quit)" ]; then
              big_files="$big_files $file"
            fi
          done

          if [ -n "$big_files" ]; then
            for file in $big_files; do
              echo "::warning title=Big image,file=$file::The image '$file' is bigger than 1MB. Consider reducing its pixel size to match the actual size on the website, or use pngcrush or similar to maximize the compression"
            done
            exit 1
          else
            echo "No changed image files larger than 1MB found."
          fi
