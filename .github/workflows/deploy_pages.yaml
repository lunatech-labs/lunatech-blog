name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the workflow to publish to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# One concurrent deployment; don't cancel an in-progress production deploy
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build static site (Roq)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Generate static site
        # Bake the generator into the build (batch is a build-time property),
        # then run the app once to emit the static site to target/roq.
        run: |
          ./mvnw -B --no-transfer-progress clean package \
            -Dquarkus.roq.generator.batch=true -DskipTests
          java -jar target/quarkus-app/quarkus-run.jar

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: target/roq

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
