name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    # Daily rebuild so future-dated posts publish once their date passes
    # (the site is generated with quarkus.roq.site.future=false)
    - cron: '0 6 * * *'
  workflow_dispatch:

# Allow the workflow to publish to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# One concurrent deployment; don't cancel an in-progress production deploy
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build static site (Roq)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Generate Roq site
        # Sets up JDK, builds and generates the site (batch mode), resolves
        # site.url from the Pages custom domain, and uploads the Pages artifact.
        uses: quarkiverse/quarkus-roq@6ee673e6b6a4e36902901ad66fbaafbb4f683f61 # v1
        env:
          # Authenticates the author-name lookups against the GitHub users API
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          java-version: '25'

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
