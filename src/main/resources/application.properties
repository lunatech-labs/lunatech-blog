# Production site URL (used for absolute links, RSS, sitemap)
site.url=https://blog.lunatech.com

# Blog posts collection -> rendered with the base theme "post" layout (overridden locally
# by templates/layouts/post.html, which pins the URL pattern for SEO stability).
site.collections.posts.layout=post

# Do not publish future-dated posts until their date passes
site.future=false

# Tagging plugin: lowercase tag keys so /tags/:tag URLs match the theme's slugified links
quarkus.roq.tagging.lowercase=true
