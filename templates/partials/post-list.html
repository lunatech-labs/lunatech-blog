<section class="hero">
    <h1 class="hero__title">Lunatech Blog</h1>
    <p class="hero__subtitle">Technical articles by Lunatech engineers</p>
</section>

{#if page.paginator}
<section class="posts-grid">
    {#for post in page.paginator.items}
    {#include partials/post-card.html post=post /}
    {/for}
</section>

<nav class="pagination">
    {#if page.paginator.previous}
    <a href="{page.paginator.previous}" class="pagination__btn pagination__btn--prev">
        <i class="fa-solid fa-chevron-left"></i> Newer posts
    </a>
    {/if}
    {#if page.paginator.next}
    <a href="{page.paginator.next}" class="pagination__btn pagination__btn--next">
        Older posts <i class="fa-solid fa-chevron-right"></i>
    </a>
    {/if}
</nav>
{/if}
